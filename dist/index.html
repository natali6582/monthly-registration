<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>הרשמה להדרכת לקוחות</title>
  <style>
    :root {
      --ink: #182332;
      --muted: #667282;
      --line: #dce3eb;
      --page: #f5f7fa;
      --panel: #ffffff;
      --blue: #0b6ef3;
      --blue-dark: #094fb0;
      --teal: #008c89;
      --focus: rgba(11, 110, 243, .18);
      --shadow: 0 18px 46px rgba(24, 35, 50, .13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(11, 110, 243, .10), rgba(0, 140, 137, .08)),
        var(--page);
      font-family: Arial, "Segoe UI", sans-serif;
    }

    main {
      width: min(1160px, calc(100% - 28px));
      min-height: min(720px, calc(100vh - 28px));
      display: grid;
      grid-template-columns: .76fr 1.24fr;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .intro {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 34px;
      color: #fff;
      background:
        linear-gradient(150deg, rgba(9, 79, 176, .94), rgba(0, 140, 137, .86)),
        #0b6ef3;
    }

    .badge {
      width: fit-content;
      padding: 7px 11px;
      border: 1px solid rgba(255, 255, 255, .34);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 26px 0 12px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .intro p {
      margin: 0;
      max-width: 390px;
      color: rgba(255, 255, 255, .86);
      font-size: 18px;
      line-height: 1.5;
    }

    .date {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, .24);
      font-size: 17px;
      font-weight: 800;
    }

    .date span {
      display: block;
      margin-top: 4px;
      color: rgba(255, 255, 255, .78);
      font-size: 14px;
      font-weight: 400;
    }

    form {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
      padding: 30px;
      min-width: 0;
    }

    .form-head h2 {
      margin: 0 0 4px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .form-head p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .content {
      display: grid;
      grid-template-columns: .86fr 1.14fr;
      gap: 18px;
      min-height: 0;
    }

    .fields,
    .topics {
      min-width: 0;
    }

    .fields {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    label.field {
      display: grid;
      gap: 5px;
      font-size: 14px;
      font-weight: 800;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      height: 46px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      outline: none;
      transition: border-color .16s ease, box-shadow .16s ease;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .topics {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f9fbfd;
    }

    .topics-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .topics-title strong {
      font-size: 17px;
    }

    .topics-title span {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-content: start;
    }

    .choice {
      position: relative;
      min-height: 86px;
      cursor: pointer;
    }

    .choice input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .choice span {
      height: 100%;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
      line-height: 1.25;
      transition: border-color .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease;
    }

    .choice small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.25;
    }

    .choice input:checked + span {
      border-color: var(--blue);
      background: #eef5ff;
      box-shadow: 0 8px 22px rgba(11, 110, 243, .12);
    }

    .choice input:focus-visible + span {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .other-topic {
      grid-column: 1 / -1;
      display: grid;
      gap: 5px;
      margin-top: 2px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .selected {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .status {
      margin-top: 5px;
      color: var(--teal);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.3;
    }

    button,
    .submit-link {
      min-height: 48px;
      padding: 12px 22px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--blue);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background .16s ease, transform .16s ease, box-shadow .16s ease;
    }

    button:hover,
    .submit-link:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(11, 110, 243, .22);
    }

    button:disabled {
      cursor: wait;
      opacity: .72;
      transform: none;
      box-shadow: none;
    }

    @media (max-width: 980px) {
      body {
        display: block;
      }

      main {
        width: 100%;
        min-height: 100vh;
        grid-template-columns: 1fr;
        border-radius: 0;
        border: 0;
      }

      .intro {
        padding: 24px;
      }

      h1 {
        margin-top: 18px;
      }

      form {
        padding: 22px;
      }
    }

    @media (max-width: 740px) {
      .content,
      .actions {
        grid-template-columns: 1fr;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .submit-link {
        width: 100%;
      }
    }

    @media (max-height: 720px) and (min-width: 981px) {
      main {
        min-height: calc(100vh - 24px);
      }

      .intro,
      form {
        padding: 24px;
      }

      h1 {
        font-size: 42px;
      }

      .choice {
        min-height: 74px;
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"] {
        height: 42px;
      }
    }

    body,
    body * {
      font-size: 16px !important;
    }
  </style>
</head>
<body>
  <main>
    <section class="intro" aria-label="פרטי ההדרכה">
      <div>
        <div class="badge">הדרכת לקוחות חודשית</div>
        <h1>בחרו נושא להדרכה</h1>
        <p>מלאו פרטים ובחרו את הנושאים שהכי חשובים לכם.</p>
      </div>
      <div class="date">
        תחילת כל חודש
        <span>זימון עם המועד המדויק ישלח לאחר ההרשמה</span>
      </div>
    </section>

    <form id="trainingForm" action="https://hook.us2.make.com/t5jrfla4nfsyfetk2cudxgij53zfebfc" method="post" target="sheetSubmitFrame">
      <div class="form-head">
        <h2>הרשמה קצרה</h2>
        <p>אפשר לבחור יותר מנושא אחד.</p>
      </div>

      <div class="content">
        <div class="fields">
          <label class="field">
            שם מלא
            <input type="text" name="name" autocomplete="name" required>
          </label>

          <label class="field">
            חברה / שם משרד
            <input type="text" name="company" autocomplete="organization" required>
          </label>

          <label class="field">
            אימייל
            <input type="email" name="email" autocomplete="email" required>
          </label>

          <label class="field">
            טלפון
            <input type="tel" name="phone" autocomplete="tel" required>
          </label>
        </div>

        <fieldset class="topics">
          <legend class="topics-title">
            <strong>בחירת נושאים</strong>
            <span>Top Picks</span>
          </legend>

          <div class="choices">
            <label class="choice">
              <input type="checkbox" name="topic" value="טעינת קבצים">
              <span>טעינת קבצים<small>קבצים, בנקים ואחזקות שלא נקלטו</small></span>
            </label>

            <label class="choice">
              <input type="checkbox" name="topic" value="קליטת נתונים מהממשק האחיד">
              <span>קליטת נתונים מהממשק האחיד<small>מסלקה, ממשק אחיד ובדיקת קליטה</small></span>
            </label>

            <label class="choice">
              <input type="checkbox" name="topic" value="נתונים, תשואה ויתרות">
              <span>נתונים, תשואה ויתרות<small>בדיקות, אלוקציה, סיווגים וחשיפות</small></span>
            </label>

            <label class="choice">
              <input type="checkbox" name="topic" value="דוחות ללקוחות">
              <span>דוחות ללקוחות<small>דוח תשואה, תמונה פיננסית, שליחה אוטומטית</small></span>
            </label>

            <label class="choice">
              <input type="checkbox" name="topic" value="פעולות, ניוד, הפקדה ופדיון">
              <span>פעולות וניודים<small>הפקדות, פדיונות, פתיחה ושחזור פעולה</small></span>
            </label>

            <label class="choice">
              <input type="checkbox" name="topic" value="הגדרות והרשאות משרד">
              <span>הגדרות והרשאות משרד<small>עובדי המשרד, תפקידים והרשאות גישה</small></span>
            </label>

            <label class="choice">
              <input type="checkbox" name="topic" value="איחוד/מיזוג לקוחות">
              <span>איחוד/מיזוג לקוחות<small>בני זוג, משפחות ושיוך מחדש</small></span>
            </label>

            <label class="other-topic">
              אחר
              <input type="text" name="other_topic" id="otherTopic" placeholder="כתבו נושא נוסף שמעניין אתכם">
            </label>
          </div>
        </fieldset>
      </div>

      <div class="actions">
        <div>
          <div class="selected" id="selectedTopics">לא נבחרו נושאים עדיין</div>
          <div class="status" id="submitStatus" aria-live="polite"></div>
        </div>
        <button id="submitButton" type="submit">שליחת הרשמה</button>
      </div>
      <input type="hidden" name="selected_topics" id="selectedTopicsInput">
      <input type="hidden" name="source" value="wix-training-landing">
      <input type="hidden" name="target_spreadsheet_id" value="1KVnCH206v5Bq4LT-cuTncBrvJwD5TcV1_zQwP2sOkeE">
    </form>
    <iframe name="sheetSubmitFrame" title="sheet submit frame" style="display:none"></iframe>
  </main>

  <script>
    const form = document.getElementById("trainingForm");
    const selectedTopics = document.getElementById("selectedTopics");
    const selectedTopicsInput = document.getElementById("selectedTopicsInput");
    const submitStatus = document.getElementById("submitStatus");
    const submitButton = document.getElementById("submitButton");
    const submitFrame = document.querySelector("iframe[name='sheetSubmitFrame']");
    const checks = Array.from(document.querySelectorAll("input[name='topic']"));
    const otherTopic = document.getElementById("otherTopic");
    let submittedToSheet = false;

    function updateSelectedTopics() {
      const selected = checks.filter((input) => input.checked).map((input) => input.value);
      const other = otherTopic.value.trim();
      const allTopics = other ? selected.concat("אחר: " + other) : selected;
      selectedTopicsInput.value = allTopics.join(", ");
      selectedTopics.textContent = allTopics.length
        ? "נבחרו: " + allTopics.join(" | ")
        : "לא נבחרו נושאים עדיין";
    }

    checks.forEach((input) => input.addEventListener("change", updateSelectedTopics));
    otherTopic.addEventListener("input", updateSelectedTopics);

    form.addEventListener("submit", (event) => {
      const selected = checks.filter((input) => input.checked);
      const other = otherTopic.value.trim();

      if (form.action.includes("GOOGLE_APPS_SCRIPT_WEB_APP_URL")) {
        event.preventDefault();
        alert("יש להחליף את GOOGLE_APPS_SCRIPT_WEB_APP_URL בכתובת Web App של Google Apps Script.");
        return;
      }

      if (!selected.length && !other) {
        event.preventDefault();
        submitStatus.textContent = "בחרו לפחות נושא אחד.";
        return;
      }

      submittedToSheet = true;
      submitButton.disabled = true;
      submitStatus.textContent = "שולח...";
    });

    submitFrame.addEventListener("load", () => {
      if (!submittedToSheet) return;
      form.reset();
      updateSelectedTopics();
      submitButton.disabled = false;
      submitStatus.textContent = "ההרשמה נשלחה.";
      submittedToSheet = false;
    });

    updateSelectedTopics();
  </script>
</body>
</html>
